{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - KHAOS STORE</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* (mismos estilos) */
    </style>
</head>
<body>
    <div class="login-container">
        <h1>INICIAR SESIÓN</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        {% if request.GET.next %}
        <div class="info-message">
            🔒 Necesitas iniciar sesión para continuar
        </div>
        {% endif %}
        
        <!-- IMPORTANTE: action apunta a 'login' que es el nombre de la URL -->
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">
            
            <div class="form-group">
                <label>USUARIO</label>
                <input type="text" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label>CONTRASEÑA</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">INGRESAR</button>
        </form>
        
        <div class="register-link">
            ¿No tienes cuenta? <a href="{% url 'register' %}?next={{ request.GET.next }}">REGÍSTRATE</a>
        </div>
        
        <a href="{% url 'home' %}" class="back-link">← VOLVER</a>
    </div>
</body>
</html>
