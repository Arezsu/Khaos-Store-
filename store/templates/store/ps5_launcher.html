{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KHAOS STORE - Boot</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #0a0a1a, #000000);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Pantalla de boot completa */
        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a1a, #000000);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 1;
        }

        /* Ocultar el boot screen después de la animación */
        .boot-screen.hide {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* Contenedor del logo y la animación */
        .boot-content {
            text-align: center;
            transform: scale(0.9);
            animation: bootPulse 1.5s infinite alternate;
        }

        @keyframes bootPulse {
            0% {
                transform: scale(0.9);
                opacity: 0.5;
                filter: blur(2px);
            }
            100% {
                transform: scale(1.1);
                opacity: 1;
                filter: blur(0px);
                text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffff;
            }
        }

        .boot-logo {
            font-family: 'Press Start 2P', cursive;
            font-size: 48px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .boot-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }

        .press-key {
            margin-top: 80px;
            animation: blinkText 1.5s step-end infinite;
            font-size: 18px;
            font-weight: 300;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; text-shadow: 0 0 5px #ff00ff; }
            50% { opacity: 0.5; text-shadow: none; }
        }

        .ps-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateIcon 2s linear infinite;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- Pantalla de Boot -->
<div id="bootScreen" class="boot-screen">
    <div class="boot-content">
        <div class="ps-icon">🎮</div>
        <div class="boot-logo">KHAOS STORE</div>
        <div class="boot-subtitle">PLAYSTATION 5 EDITION</div>
        <div class="press-key">⚡ PRESIONA CUALQUIER TECLA PARA INICIAR ⚡</div>
    </div>
</div>

<script>
    const bootScreen = document.getElementById('bootScreen');

    function redirectToStore() {
        if (bootScreen && !bootScreen.classList.contains('hide')) {
            bootScreen.classList.add('hide');
            // Esperar a que termine la transición de opacidad (1.5s) y luego redirigir
            setTimeout(() => {
                window.location.href = "{% url 'home' %}";
            }, 1500);
        }
    }

    // Detectar cualquier tecla presionada
    document.addEventListener('keydown', function(event) {
        redirectToStore();
    });

    // También permitir que un clic en la pantalla de boot la cierre
    if (bootScreen) {
        bootScreen.addEventListener('click', function() {
            redirectToStore();
        });
    }
</script>

</body>
</html>
