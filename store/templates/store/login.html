{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - KHAOS STORE</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .login-container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid;
            border-image: linear-gradient(45deg, #ff00ff, #00ffff) 1;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #ff00ff; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #00ffff; text-decoration: none; }
        .messages { margin-bottom: 20px; }
        .message { padding: 10px; border-radius: 5px; margin-bottom: 10px; text-align: center; }
        .message.error { background: rgba(255,0,0,0.2); border: 1px solid #ff0000; color: #ff0000; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>INICIAR SESIÓN</h1>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>USUARIO</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>CONTRASEÑA</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">INGRESAR</button>
        </form>
        
        <div class="register-link">
            ¿No tienes cuenta? <a href="{% url 'register' %}">REGÍSTRATE</a>
        </div>
        
        <a href="{% url 'home' %}" class="back-link">← VOLVER A LA TIENDA</a>
    </div>
</body>
</html>
