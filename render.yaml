services:
  - type: web
    name: khaos-store
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py makemigrations store --noinput
      python manage.py migrate --noinput
      python manage.py migrate store --noinput
    startCommand: gunicorn khaos_store.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: khaos-store-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: dxbsu1sud
      - key: CLOUDINARY_API_KEY
        value: 673698288254848
      - key: CLOUDINARY_API_SECRET
        value: wC0DfLplnYAIBEqrpe9maNE3i2Q
      - key: EMAIL_HOST_USER
        value: soportekhaosstore@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: zhdi hsev bqtt lnyg
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"

databases:
  - name: khaos-store-db
    databaseName: khaos_store
    user: khaos_user