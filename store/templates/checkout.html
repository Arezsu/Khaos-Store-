<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Khaos Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .checkout-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .product-preview {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
        }
        .product-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        .product-details {
            flex: 1;
        }
        .product-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .product-price {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .product-description {
            color: #666;
            line-height: 1.6;
        }
        .checkout-form {
            border-top: 2px solid #eee;
            padding-top: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .total-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            text-align: right;
        }
        .total-label {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .total-amount {
            font-size: 2.5em;
            font-weight: bold;
            margin-left: 15px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 0.9em;
        }
        .back-link:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>🛒 Checkout</h1>
        
        <div class="product-preview">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image">
            {% else %}
                <div class="product-image" style="background: #ddd; display: flex; align-items: center; justify-content: center;">
                    <span style="color: #999;">Sin imagen</span>
                </div>
            {% endif %}
            <div class="product-details">
                <div class="product-name">{{ product.name }}</div>
                <div class="product-price">${{ product.price }}</div>
                <div class="product-description">{{ product.description|truncatewords:30 }}</div>
            </div>
        </div>

        <form method="post" action="{% url 'process_payment' 1 %}" class="checkout-form">
            {% csrf_token %}
            <h2 style="margin-bottom: 20px;">Información de envío</h2>
            
            <div class="form-group">
                <label for="name">Nombre completo</label>
                <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="juan@email.com">
            </div>
            
            <div class="form-group">
                <label for="address">Dirección</label>
                <input type="text" id="address" name="address" required placeholder="Calle, número, colonia">
            </div>
            
            <div class="form-group">
                <label for="city">Ciudad</label>
                <input type="text" id="city" name="city" required placeholder="Tu ciudad">
            </div>
            
            <div class="form-group">
                <label for="zipcode">Código Postal</label>
                <input type="text" id="zipcode" name="zipcode" required placeholder="12345">
            </div>

            <h2 style="margin: 30px 0 20px;">Método de pago</h2>
            
            <div class="form-group">
                <label for="card_number">Número de tarjeta</label>
                <input type="text" id="card_number" name="card_number" required placeholder="**** **** **** ****">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="expiry">Fecha expiración</label>
                    <input type="text" id="expiry" name="expiry" required placeholder="MM/AA">
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" required placeholder="123">
                </div>
            </div>

            <div class="total-section">
                <span class="total-label">Total a pagar:</span>
                <span class="total-amount">${{ product.price }}</span>
            </div>

            <button type="submit" class="btn">Pagar ahora</button>
        </form>

        <a href="{% url 'home' %}" class="back-link">← Seguir comprando</a>
    </div>
</body>
</html>
